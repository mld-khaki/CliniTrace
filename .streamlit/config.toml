# Streamlit theme overrides for CliniTrace.
#
# Streamlit's default primary color is a punchy red (#ff4b4b) which reads as
# "warning / error" in a clinical context. We use a calmer blue instead so
# primary actions (Save, Start task, Next) don't visually scream at the user.
#
# Other named colors:
#   - secondaryBackgroundColor: sidebar / form background tint
#   - textColor:                main body text
#   - backgroundColor:          page background

[theme]
primaryColor = "#313EF3"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FB"
textColor = "#1F1F2A"
font = "sans serif"

[server]
# `headless = true` skips the interactive first-run email prompt
# ("Welcome to Streamlit!"), which is blocking on a server with no
# stdin — Streamlit Cloud's health check times out waiting for the
# prompt to clear if this is left at `false`.
#
# It also keeps Streamlit from auto-opening a browser tab when launched
# from a subprocess locally (the wizard at `python -m clinitrace ui`
# prints the URL and lets the user click it).
headless = true

[browser]
# Disable Streamlit's anonymous-usage telemetry. The default is true,
# which (a) sends pings to streamlit.io that may not be appropriate
# for a clinical-data demo and (b) factors into the first-run prompt
# behaviour above.
gatherUsageStats = false
